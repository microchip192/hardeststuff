<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARDEST STUFF</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --bg-card: #151a24;
            --bg-hover: #1e2533;
            --accent-color: #7289da;
            --text-main: #f6f8fa;
            --text-muted: #8b949e;
            --border-color: #21262d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-card);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        header span {
            color: var(--accent-color);
        }

        .top-nav {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .tab-button,
        .top-button {
            color: var(--text-main);
            background-color: var(--bg-hover);
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
            transition: 0.2s ease;
            cursor: pointer;
        }

        .tab-button:hover,
        .top-button:hover,
        .tab-button.active {
            background-color: var(--accent-color);
            color: white;
            transform: scale(1.05);
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .list-sidebar {
            width: 35%;
            min-width: 300px;
            border-right: 2px solid var(--border-color);
            overflow-y: auto;
            padding: 1rem;
            background-color: #0d1117;
        }

        .level-item {
            background-color: var(--bg-card);
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .level-item:hover,
        .level-item.active {
            background-color: var(--bg-hover);
            border-color: var(--accent-color);
        }

        .level-item.active {
            box-shadow: 0 0 10px rgba(114, 137, 218, 0.2);
        }

        .level-rank {
            font-size: 1.5rem;
            font-weight: bold;
            margin-right: 1rem;
            color: var(--accent-color);
            min-width: 40px;
        }

        .level-info h3 {
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .level-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .details-panel {
            width: 65%;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .level-title-large {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .meta-card {
            background-color: var(--bg-card);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .meta-card label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .meta-card .value {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 800px) {
            body {
                overflow: auto;
                height: auto;
            }

            header,
            .main-container {
                flex-direction: column;
            }

            .list-sidebar,
            .details-panel {
                width: 100%;
                min-width: 0;
                border-right: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>HARDEST<span>STUFF</span></h1>
        <div class="top-nav">
            <button class="tab-button active" data-tab="topics">Hardest Topics</button>
            <button class="tab-button" data-tab="people">People Ranking</button>
            <a href="about.html" class="top-button">About Me</a>
        </div>
    </header>

    <div class="main-container">
        <div class="list-sidebar" id="level-list"></div>
        <div class="details-panel" id="details-panel"></div>
    </div>

    <script>
        const rankings = {
            topics: [
                {
                    rank: 1,
                    name: "Quantum Physics",
                    creator: "Max Planck",
                    date: "December 14th, 1900",
                    category: "Physics",
                    videoUrl: "https://www.youtube.com/embed/Usu9xZfabPM"
                },
                {
                    rank: 2,
                    name: "Millennium Prize Problems",
                    creator: "Clay Mathematics Institute",
                    date: "May 24th, 2000",
                    category: "Mathematics",
                    videoUrl: "https://www.youtube.com/embed/JnjkQbdnKhQ"
                },
                {
                    rank: 3,
                    name: "Nobel Prize",
                    creator: "Alfred Nobel",
                    date: "November 27th, 1895",
                    category: "Awards",
                    videoUrl: "https://www.youtube.com/embed/94YQ3el6LMc"
                },
                {
                    rank: 4,
                    name: "Amythest (No CBF)",
                    creator: "iMist",
                    date: "May 25th, 2025",
                    category: "Games / Geometry Dash",
                    videoUrl: "https://www.youtube.com/embed/4lfkzz1VCbA"
                },
                {
                    rank: 5,
                    name: "Free Soloing Taipei 101",
                    creator: "Alex Honnold",
                    date: "January 25th, 2026",
                    category: "Physical Activity",
                    videoUrl: "https://www.youtube.com/embed/BlICmBMDVno"
                },
                {
                    rank: 6,
                    name: "Becoming a Billionaire",
                    creator: "N/A",
                    date: "N/A",
                    category: "Wealth / Money",
                    videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
                },
                {
                    rank: 7,
                    name: "Sonic Wave Infinity",
                    creator: "APTeam",
                    date: "Xanii",
                    category: "Geometry Dash",
                    videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
                },
                {
                    rank: 8,
                    name: "Becoming a Chess Grandmaster",
                    creator: "N/A",
                    date: "N/A",
                    category: "Chess",
                    videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
                },
                {
                    rank: 9,
                    name: "Self Studying Calculus",
                    creator: "Isaac Newton / Gottfried Wilhelm Leibniz",
                    date: "1665–1666 / November 11, 1675",
                    category: "Mathematics",
                    videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
                }
            ],
            people: [
                {
                    rank: 1,
                    name: "Albert Einstein",
                    creator: "Theoretical Physicist",
                    date: "1879–1955",
                    category: "Science",
                    videoUrl: "https://www.youtube.com/embed/KM4Xe6Dlp0Y"
                },
                {
                    rank: 2,
                    name: "Isaac Newton",
                    creator: "Mathematician / Physicist",
                    date: "1643–1727",
                    category: "Science / Math",
                    videoUrl: "https://www.youtube.com/embed/PCxP24qj2UQ"
                },
                {
                    rank: 3,
                    name: "Leonardo da Vinci",
                    creator: "Artist / Inventor",
                    date: "1452–1519",
                    category: "Art / Engineering",
                    videoUrl: "https://www.youtube.com/embed/3cLQ_6I21t4"
                },
                {
                    rank: 4,
                    name: "Magnus Carlsen",
                    creator: "Chess Grandmaster",
                    date: "Born 1990",
                    category: "Chess",
                    videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
                },
                {
                    rank: 5,
                    name: "Alex Honnold",
                    creator: "Free Solo Climber",
                    date: "Born 1985",
                    category: "Sports / Climbing",
                    videoUrl: "https://www.youtube.com/embed/urRVZ4SW7WU"
                }
            ]
        };

        const listSidebar = document.getElementById('level-list');
        const detailsPanel = document.getElementById('details-panel');
        const tabButtons = document.querySelectorAll('.tab-button');
        let currentTab = 'topics';

        function renderSidebar() {
            listSidebar.innerHTML = '';
            const data = rankings[currentTab];

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.classList.add('level-item');
                if (index === 0) card.classList.add('active');

                card.innerHTML = `
                    <div class="level-rank">#${item.rank}</div>
                    <div class="level-info">
                        <h3>${item.name}</h3>
                        <p>${currentTab === 'people' ? item.creator : 'By ' + item.creator}</p>
                    </div>
                `;

                card.addEventListener('click', () => {
                    document.querySelectorAll('.level-item').forEach(i => i.classList.remove('active'));
                    card.classList.add('active');
                    renderDetails(item);
                });

                listSidebar.appendChild(card);
            });

            renderDetails(data[0]);
        }

        function renderDetails(item) {
            detailsPanel.innerHTML = `
                <div class="level-title-large">${item.name}</div>
                <div class="meta-grid">
                    <div class="meta-card">
                        <label>${currentTab === 'people' ? 'Known For' : 'Publisher / Creator'}</label>
                        <div class="value">${item.creator}</div>
                    </div>
                    <div class="meta-card">
                        <label>${currentTab === 'people' ? 'Life / Birth Date' : 'Date'}</label>
                        <div class="value">${item.date}</div>
                    </div>
                    <div class="meta-card">
                        <label>Category</label>
                        <div class="value">${item.category}</div>
                    </div>
                </div>

                <h3 style="margin-top: 1rem;">Overview</h3>
                <div class="video-container">
                    <iframe
                        src="${item.videoUrl}"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                </div>
            `;
        }

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                tabButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentTab = button.dataset.tab;
                renderSidebar();
            });
        });

        renderSidebar();
    </script>
</body>
</html>
